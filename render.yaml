services:
  - type: web
    name: valifi-fintech-platform
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: valifi-postgres
          property: connectionString
      - key: NEXT_PUBLIC_API_URL
        value: https://valifi-fintech-platform.onrender.com/api

databases:
  - name: valifi-postgres
    databaseName: valifi_production
    user: valifi_user
    plan: free
