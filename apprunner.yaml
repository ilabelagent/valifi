version: 1.0
runtime: nodejs22
build:
  commands:
    install:
      - npm install
    build:
      - npm run build
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: 8080
  - name: DATABASE_URL
    value: file:./valifi.db
  - name: JWT_SECRET
    value: valifi_jwt_production_secret_2025_secure_key_app_runner
  - name: CORS_ORIGIN
    value: "*"
run:
  command: node full-stack-server.js
  network:
    port: 8080
    env: PORT
  runtime-version: 22.14.0