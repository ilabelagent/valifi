version: 1.0
runtime: nodejs20
build:
  commands:
    pre_build:
      - echo "Preparing build environment for Valifi"
      - node --version
      - npm --version
    install:
      - echo "Installing dependencies with npm"
      - npm install --production=false
    build:
      - echo "Building Valifi application"
      - npm run build
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: 8080
  - name: DB_HOST
    value: valifi-production-db.c8y4mxfhjklm.us-east-1.rds.amazonaws.com
  - name: DB_PORT
    value: 5432
  - name: DB_NAME
    value: valifi_production
  - name: DB_USER
    value: valifi_admin
  - name: DB_PASSWORD
    value: YOUR_RDS_PASSWORD_HERE
  - name: DATABASE_URL
    value: postgresql://valifi_admin:YOUR_RDS_PASSWORD_HERE@valifi-production-db.c8y4mxfhjklm.us-east-1.rds.amazonaws.com:5432/valifi_production
  - name: JWT_SECRET
    value: valifi_jwt_production_secret_2025_secure_key_app_runner_rds
  - name: CORS_ORIGIN
    value: "*"
  - name: DB_POOL_MAX
    value: 20
  - name: DB_POOL_MIN
    value: 5
run:
  command: node full-stack-server.js
  network:
    port: 8080
    env: PORT
  runtime-version: 22.14.0