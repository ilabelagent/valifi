version: 1.0
runtime: nodejs20
build:
  commands:
    pre_build:
      - echo "🚀 Valifi Auto-Build Pipeline Starting..."
      - echo "Node.js version:" && node --version
      - echo "NPM version:" && npm --version
      - echo "Build timestamp:" && date
      - echo "Current directory:" && pwd
      - echo "Directory contents:" && ls -la
    install:
      - echo "📦 Installing all dependencies (including devDependencies)..."
      - npm ci
      - echo "✅ Dependencies installed successfully"
      - echo "Installed packages:" && npm list --depth=0
    build:
      - echo "🏗️ Building Valifi application..."
      - NODE_ENV=development npm run build
      - echo "📊 Build artifacts:"
      - ls -la dist/ || echo "No dist directory found"
      - echo "✅ Build completed successfully"
    post_build:
      - echo "🔍 Post-build validation..."
      - test -f "full-stack-server.js" && echo "✅ Server file found" || echo "❌ Server file missing"
      - test -d "dist" && echo "✅ Frontend build directory found" || echo "❌ Frontend build directory missing"
      - echo "📁 Final directory structure:" && ls -la
      - echo "🎉 Auto-build pipeline completed!"
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: 8080
  - name: DB_HOST
    value: valifi-production-db.c8y4mxfhjklm.us-east-1.rds.amazonaws.com
  - name: DB_PORT
    value: 5432
  - name: DB_NAME
    value: valifi_production
  - name: DB_USER
    value: valifi_admin
  - name: DB_PASSWORD
    value: YOUR_RDS_PASSWORD_HERE
  - name: DATABASE_URL
    value: postgresql://valifi_admin:YOUR_RDS_PASSWORD_HERE@valifi-production-db.c8y4mxfhjklm.us-east-1.rds.amazonaws.com:5432/valifi_production
  - name: JWT_SECRET
    value: valifi_jwt_production_secret_2025_secure_key_app_runner_rds
  - name: CORS_ORIGIN
    value: "*"
  - name: DB_POOL_MAX
    value: 20
  - name: DB_POOL_MIN
    value: 5
run:
  command: node full-stack-server.js
  network:
    port: 8080
    env: PORT
  runtime-version: 22.14.0