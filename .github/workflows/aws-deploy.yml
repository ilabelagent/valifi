name: 🚀 Auto Build & Deploy to AWS App Runner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 🔨 Build & Test

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ⚡ Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: 📦 Install dependencies
      run: bun install

    - name: 🔍 Run type check
      run: bun run typecheck

    - name: 🧹 Run linting
      run: bun run lint
      continue-on-error: true

    - name: 🏗️ Build application
      run: bun run build

    - name: ✅ Test build output
      run: |
        ls -la dist/
        echo "Build completed successfully!"

  deploy-to-aws:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: 🚀 Deploy to AWS App Runner
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🌐 Check App Runner service status
      id: app-runner-status
      run: |
        SERVICE_ARN=$(aws apprunner list-services --query 'ServiceSummaryList[?ServiceName==`valifi-fintech`].ServiceArn' --output text)
        if [ -n "$SERVICE_ARN" ]; then
          echo "service-arn=$SERVICE_ARN" >> $GITHUB_OUTPUT
          STATUS=$(aws apprunner describe-service --service-arn $SERVICE_ARN --query 'Service.Status' --output text)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Service found: $SERVICE_ARN with status: $STATUS"
        else
          echo "status=NOT_FOUND" >> $GITHUB_OUTPUT
          echo "Service not found, will create new one"
        fi

    - name: 🚀 Create or Update App Runner service
      run: |
        if [ "${{ steps.app-runner-status.outputs.status }}" = "NOT_FOUND" ]; then
          echo "Creating new App Runner service..."
          aws apprunner create-service \
            --service-name valifi-fintech \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "public.ecr.aws/lambda/nodejs:20",
                "ImageConfiguration": {
                  "Port": "8080",
                  "StartCommand": "node full-stack-server.js"
                },
                "ImageRepositoryType": "ECR_PUBLIC"
              },
              "CodeRepository": {
                "RepositoryUrl": "https://github.com/ilabelagent/valifi",
                "SourceCodeVersion": {
                  "Type": "BRANCH",
                  "Value": "main"
                },
                "CodeConfiguration": {
                  "ConfigurationSource": "REPOSITORY"
                }
              },
              "AutoDeploymentsEnabled": true
            }' \
            --instance-configuration '{
              "Cpu": "0.25 vCPU",
              "Memory": "0.5 GB",
              "InstanceRoleArn": "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/AppRunnerInstanceRole"
            }'
        else
          echo "Service exists, triggering deployment..."
          aws apprunner start-deployment --service-arn ${{ steps.app-runner-status.outputs.service-arn }}
        fi

    - name: ⏳ Wait for deployment
      run: |
        SERVICE_ARN=${{ steps.app-runner-status.outputs.service-arn }}
        if [ -n "$SERVICE_ARN" ]; then
          echo "Waiting for deployment to complete..."
          aws apprunner wait service-updated --service-arn $SERVICE_ARN

          # Get service URL
          SERVICE_URL=$(aws apprunner describe-service --service-arn $SERVICE_ARN --query 'Service.ServiceUrl' --output text)
          echo "🌐 Service deployed at: https://$SERVICE_URL"
          echo "SERVICE_URL=https://$SERVICE_URL" >> $GITHUB_ENV
        fi

    - name: 🏥 Health check
      run: |
        if [ -n "$SERVICE_URL" ]; then
          echo "Performing health check..."
          for i in {1..10}; do
            if curl -f "$SERVICE_URL/api/health"; then
              echo "✅ Health check passed!"
              break
            else
              echo "⏳ Attempt $i failed, retrying in 30s..."
              sleep 30
            fi
          done
        fi

    - name: 📊 Deployment Summary
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Service**: valifi-fintech" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Deployed ✅" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: $SERVICE_URL" >> $GITHUB_STEP_SUMMARY
        echo "- **Health**: /api/health" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY